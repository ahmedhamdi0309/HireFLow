<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="HireFlow — Smart Job Publishing Platform" />
  <title>HireFlow — Smart Job Publishing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- App Root -->
  <div id="app">
    <!-- Auth Screen or Main App renders here -->
  </div>

  <!-- Sidebar Overlay (mobile) -->
  <div id="sidebar-overlay" class="sidebar-overlay hidden" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="26" height="26">
            <g stroke="#000000" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="32 20, 48 28, 32 36, 16 28" />
              <polyline points="16 35, 32 43, 48 35" />
              <polyline points="16 42, 32 50, 48 42" />
            </g>
          </svg>
        </div>
        <div>
          <div class="logo-name" id="logo-name">HireFlow</div>
          <div class="logo-tag" id="logo-tag">Smart Publishing</div>
        </div>
      </div>
      <button class="sidebar-close" onclick="closeSidebar()" id="sidebar-close-btn" aria-label="Close sidebar">✕</button>
    </div>

    <!-- User badge -->
    <div class="sidebar-user" id="sidebar-user"></div>

    <!-- Navigation -->
    <nav class="sidebar-nav" id="sidebar-nav" role="navigation"></nav>

    <!-- Bottom actions -->
    <div class="sidebar-footer" id="sidebar-footer"></div>
  </aside>

  <!-- Main Wrapper -->
  <div id="main-wrapper" class="main-wrapper">

    <!-- Top Bar -->
    <header class="topbar" id="topbar" role="banner">
      <div class="topbar-left">
        <button class="topbar-hamburger" onclick="toggleSidebar()" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-breadcrumb" id="topbar-breadcrumb"></div>
      </div>
      <div class="topbar-right" id="topbar-right"></div>
    </header>

    <!-- Page Content -->
    <main id="page-content" class="page-content" role="main"></main>

    <!-- Footer -->
    <footer class="app-footer" id="app-footer">
      <span id="footer-text">© 2025 HireFlow — Smart Job Publishing Platform</span>
    </footer>

  </div>

  <!-- Bottom Nav (mobile) -->
  <nav id="bottom-nav" class="bottom-nav hidden" role="navigation" aria-label="Mobile navigation"></nav>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="handleModalOverlayClick(event)">
    <div id="modal-box" class="modal-box"></div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
